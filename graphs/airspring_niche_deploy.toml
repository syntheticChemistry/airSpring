# SPDX-License-Identifier: AGPL-3.0-or-later
#
# biomeOS Niche Deployment Graph — airSpring ecology niche
#
# neuralAPI pattern: declarative niche deployment via capability routing.
# Each node registers capabilities with biomeOS, creating a composition
# surface for the Pathway Learner to discover parallelization opportunities.
#
# Deploys: Tower Atomic → Provenance Trio → NestGate → ToadStool → airSpring
# Provenance trio is optional — niche degrades gracefully to standalone mode.
#
# biomeOS learns from this graph: startup order, dependencies, health endpoints.
# Pathway Learner can optimize: parallel trio startup, NestGate prewarming.
#
# STATUS: Production-ready (Mar 15, 2026)
# Extends: metalForge/deploy/airspring_deploy.toml
#
# Usage:
#   biomeos deploy --graph graphs/airspring_niche_deploy.toml

[graph]
name = "airspring_ecology_niche"
description = "Full airSpring ecology niche with neuralAPI capability routing"
version = "0.8.1"
coordination = "Sequential"

# ── Node 1: BearDog (crypto + key management) ─────────────────────
[[graph.node]]
name = "beardog"
binary = "beardog_primal"
order = 1
required = true
health_method = "health"
by_capability = "crypto"
capabilities = [
    "crypto.sign",
    "crypto.verify",
    "crypto.encrypt",
    "crypto.keygen",
]

# ── Node 2: Songbird (network + sovereign TLS 1.3) ────────────────
[[graph.node]]
name = "songbird"
binary = "songbird_primal"
order = 2
required = true
depends_on = ["beardog"]
health_method = "health"
by_capability = "network"
capabilities = [
    "network.tls_connect",
    "network.http_fetch",
    "network.dns_resolve",
]

# ── Node 3: rhizoCrypt (ephemeral DAG sessions) ───────────────────
# Pathway Learner hint: can start in parallel with loamSpine once BearDog is up.
[[graph.node]]
name = "rhizocrypt"
binary = "rhizocrypt_primal"
order = 3
required = false
depends_on = ["beardog"]
health_method = "dag.health"
by_capability = "dag"
capabilities = [
    "dag.create_session",
    "dag.append_event",
    "dag.dehydrate",
    "dag.merkle_root",
    "dag.health",
]

# ── Node 4: loamSpine (immutable linear ledger) ───────────────────
# Pathway Learner hint: batching appends gives 10x speedup.
[[graph.node]]
name = "loamspine"
binary = "loamspine_primal"
order = 4
required = false
depends_on = ["beardog", "rhizocrypt"]
health_method = "commit.health"
by_capability = "commit"
capabilities = [
    "commit.session",
    "commit.entry",
    "commit.health",
]

# ── Node 5: sweetGrass (semantic provenance braids) ────────────────
# Pathway Learner hint: attribution can run in parallel with NestGate store.
[[graph.node]]
name = "sweetgrass"
binary = "sweetgrass_primal"
order = 5
required = false
depends_on = ["beardog", "loamspine"]
health_method = "provenance.health"
by_capability = "provenance"
capabilities = [
    "provenance.create_braid",
    "provenance.lineage",
    "provenance.graph",
    "provenance.attribution",
    "provenance.health",
]

# ── Node 6: NestGate (content-addressed storage) ──────────────────
# Pathway Learner hint: prewarming cache gives faster first-read.
[[graph.node]]
name = "nestgate"
binary = "nestgate_primal"
order = 6
required = false
depends_on = ["beardog", "songbird"]
health_method = "health"
by_capability = "storage"
capabilities = [
    "storage.store",
    "storage.get",
    "storage.store_blob",
    "storage.health",
]

# ── Node 7: ToadStool (GPU/CPU compute dispatch) ──────────────────
[[graph.node]]
name = "toadstool"
binary = "toadstool_primal"
order = 7
required = false
depends_on = ["beardog", "songbird"]
health_method = "compute.health"
by_capability = "compute"
capabilities = [
    "compute.health",
    "compute.version",
    "compute.execute",
    "compute.batch",
    "compute.precision_probe",
]

[graph.node.env]
TOADSTOOL_PRECISION = "auto"
TOADSTOOL_MULTI_DEVICE = "true"

# ── Node 8: airSpring (ecology + agriculture science) ──────────────
# Reports composition status + operation dependencies via capability.list
# so biomeOS Pathway Learner can optimize graph execution.
[[graph.node]]
name = "airspring"
binary = "airspring_primal"
order = 8
required = true
depends_on = ["beardog", "songbird"]
health_method = "health.check"
by_capability = "ecology"
capabilities = [
    # ET₀ methods (7)
    "science.et0_fao56",
    "science.et0_hargreaves",
    "science.et0_priestley_taylor",
    "science.et0_makkink",
    "science.et0_turc",
    "science.et0_hamon",
    "science.et0_blaney_criddle",
    # Water balance & yield (2)
    "science.water_balance",
    "science.yield_response",
    # Soil physics (4)
    "science.richards_1d",
    "science.scs_cn_runoff",
    "science.green_ampt_infiltration",
    "science.soil_moisture_topp",
    "science.pedotransfer_saxton_rawls",
    # Crop & irrigation (3)
    "science.dual_kc",
    "science.sensor_calibration",
    "science.gdd",
    # Biodiversity (2)
    "science.shannon_diversity",
    "science.bray_curtis",
    # Geophysics coupling (1)
    "science.anderson_coupling",
    # Monthly ET (1)
    "science.thornthwaite",
    # Ecology composition (1)
    "ecology.experiment",
    # Drought & stochastic (3)
    "science.spi_drought_index",
    "science.autocorrelation",
    "science.gamma_cdf",
    # Provenance trio orchestration (4)
    "provenance.begin",
    "provenance.record",
    "provenance.complete",
    "provenance.status",
    # Cross-primal data & introspection (4)
    "capability.list",
    "data.cross_spring_weather",
    "compute.offload",
    "data.weather",
]

[graph.node.env]
AIRSPRING_FAMILY_ID = "8ff3b864a4bc589a"
