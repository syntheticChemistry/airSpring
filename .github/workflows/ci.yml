# SPDX-License-Identifier: AGPL-3.0-or-later
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  quality:
    name: Format + Clippy + Doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: airSpring

      - uses: actions/checkout@v4
        with:
          repository: syntheticChemistry/ecoPrimals
          path: phase1
          sparse-checkout: toadstool/crates/barracuda

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: cargo fmt
        working-directory: airSpring/barracuda
        run: cargo fmt --check

      - name: cargo clippy (pedantic)
        working-directory: airSpring/barracuda
        run: cargo clippy --all-targets -- -D warnings -W clippy::pedantic

      - name: cargo doc
        working-directory: airSpring/barracuda
        run: cargo doc --no-deps

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: airSpring

      - uses: actions/checkout@v4
        with:
          repository: syntheticChemistry/ecoPrimals
          path: phase1
          sparse-checkout: toadstool/crates/barracuda

      - uses: dtolnay/rust-toolchain@stable

      - name: cargo test
        working-directory: airSpring/barracuda
        run: cargo test

  metalforge:
    name: metalForge Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: airSpring

      - uses: actions/checkout@v4
        with:
          repository: syntheticChemistry/ecoPrimals
          path: phase1
          sparse-checkout: toadstool/crates/barracuda

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: cargo fmt
        working-directory: airSpring/metalForge/forge
        run: cargo fmt --check

      - name: cargo clippy (pedantic)
        working-directory: airSpring/metalForge/forge
        run: cargo clippy --all-targets -- -D warnings -W clippy::pedantic

      - name: cargo test
        working-directory: airSpring/metalForge/forge
        run: cargo test

  python-baselines:
    name: Python Baselines
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r control/requirements.txt

      - name: Run baselines (paper-only, no API)
        run: |
          python3 control/fao56/penman_monteith.py
          python3 control/soil_sensors/calibration_dong2020.py
          python3 control/iot_irrigation/calibration_dong2024.py
          python3 control/water_balance/fao56_water_balance.py
          python3 control/richards/richards_1d.py
          python3 control/biochar/biochar_isotherms.py
          python3 control/yield_response/yield_response.py
          python3 control/dual_kc/dual_crop_coefficient.py
          python3 control/dual_kc/cover_crop_dual_kc.py
          python3 control/cw2d/cw2d_richards.py
          python3 control/scheduling/irrigation_scheduling.py
          python3 control/lysimeter/lysimeter_et.py
          python3 control/sensitivity/et0_sensitivity.py
          python3 control/priestley_taylor/priestley_taylor_et0.py
          python3 control/thornthwaite/thornthwaite_et0.py
          python3 control/gdd/growing_degree_days.py
          python3 control/pedotransfer/saxton_rawls.py
          python3 control/et0_intercomparison/et0_three_method.py
          python3 control/forecast_scheduling/forecast_scheduling.py
          python3 control/multicrop_budget/multicrop_water_budget.py
          python3 control/nass_yield/nass_yield_validation.py
          python3 control/scan_moisture/scan_moisture_validation.py
          python3 control/ameriflux_et/ameriflux_et_validation.py
          python3 control/hargreaves/hargreaves_samani.py
          python3 control/diversity/diversity_indices.py
          python3 control/makkink/makkink_et0.py
          python3 control/turc/turc_et0.py
          python3 control/hamon/hamon_pet.py
          python3 control/blaney_criddle/blaney_criddle_et0.py
          python3 control/scs_curve_number/scs_curve_number.py
          python3 control/green_ampt/green_ampt_infiltration.py
          python3 control/coupled_runoff_infiltration/coupled_runoff_infiltration.py
          python3 control/vg_inverse/vg_inverse_fitting.py
          python3 control/season_water_budget/season_water_budget.py
          python3 control/anderson_coupling/anderson_coupling.py
          python3 control/pedotransfer_richards/pedotransfer_richards.py
          python3 control/et0_ensemble/et0_ensemble.py
          python3 control/et0_bias_correction/et0_bias_correction.py
          python3 control/gpu_math_portability/gpu_math_portability.py
          python3 control/cpu_gpu_parity/cpu_gpu_parity.py
          python3 control/neural_api/neural_api_parity.py
          python3 control/seasonal_batch_et0/seasonal_batch_et0.py
          python3 control/metalforge_dispatch/metalforge_dispatch.py

  coverage:
    name: Code Coverage (llvm-cov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: airSpring

      - uses: actions/checkout@v4
        with:
          repository: syntheticChemistry/ecoPrimals
          path: phase1
          sparse-checkout: toadstool/crates/barracuda

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov

      - name: Generate coverage report
        working-directory: airSpring/barracuda
        run: cargo llvm-cov --lib --summary-only --fail-under-lines 90

  file-size:
    name: File Size Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check no production file exceeds 1000 lines
        run: |
          violations=0
          for f in $(find barracuda/src -name '*.rs' -not -path '*/tests/*'); do
            lines=$(wc -l < "$f")
            if [ "$lines" -gt 1000 ]; then
              echo "FAIL: $f has $lines lines (max 1000)"
              violations=$((violations + 1))
            fi
          done
          if [ "$violations" -gt 0 ]; then
            echo "$violations file(s) exceed 1000-line limit"
            exit 1
          fi
          echo "All production files under 1000 lines"
